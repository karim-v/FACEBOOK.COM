<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

    <!-- IMPORTANTE para móviles -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Verificación exitosa</title>

    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #e9f0ff, #f7f9fc);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .success-box {
            background: #ffffff;
            padding: 40px 25px;
            border-radius: 14px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            text-align: center;
            width: 100%;
            max-width: 420px;
        }

        .icon {
            font-size: 60px;
            color: #22c55e;
            margin-bottom: 15px;
        }

        h2 {
            color: #1f2937;
            margin-bottom: 10px;
            font-size: 24px;
        }

        p {
            color: #4b5563;
            font-size: 16px;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        a {
            display: block;
            padding: 12px;
            background: #2a3fb7;
            color: white;
            border-radius: 8px;
            text-decoration: none;
            transition: 0.3s;
            font-size: 16px;
        }

        a:hover {
            background: #1e2f8a;
        }

        /* Ajustes extra para pantallas pequeñas */
        @media (max-width: 480px) {
            .success-box {
                padding: 30px 20px;
            }

            .icon {
                font-size: 50px;
            }

            h2 {
                font-size: 20px;
            }

            p {
                font-size: 15px;
            }
        }
    </style>
</head>

<body>
    <div class="success-box">
        <div class="icon">✔</div>
        <h2>Verificación completada</h2>
        <p>Has iniciado sesión correctamente en facebook.</p>
        <a href="/">Volver al inicio</a>
    </div>
</body>
</html>
