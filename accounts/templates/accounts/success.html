<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Verificación exitosa</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #e9f0ff, #f7f9fc);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .success-box {
            background: #ffffff;
            padding: 50px 40px;
            border-radius: 14px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 420px;
        }

        .icon {
            font-size: 50px;
            color: #22c55e;
            margin-bottom: 15px;
        }

        h2 {
            color: #1f2937;
            margin-bottom: 10px;
        }

        p {
            color: #4b5563;
            font-size: 15px;
            margin-bottom: 25px;
        }

        a {
            display: inline-block;
            padding: 10px 18px;
            background: #2a3fb7;
            color: white;
            border-radius: 8px;
            text-decoration: none;
            transition: 0.3s;
        }

        a:hover {
            background: #1e2f8a;
        }
    </style>
</head>
<body>
    <div class="success-box">
        <div class="icon">✔</div>
        <h2>Verificación completada</h2>
        <p>Has iniciado sesión correctamente en facebook.</p>
        <a href="/">Volver al inicio</a>
    </div>
</body>
</html>
